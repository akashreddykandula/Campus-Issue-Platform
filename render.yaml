# render.yaml
# -----------
# Deploy both services on Render with a single config.
# Commit this to your repo root; Render picks it up automatically.

services:
  # ── Backend (Flask) ────────────────────────────────────────────────────────
  - type: web
    name: campus-issue-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn run:app --config gunicorn.conf.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: campus-issue-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app   # ← replace with your Vercel URL
      - key: UPLOAD_FOLDER
        value: /opt/render/project/uploads
      - key: MAX_CONTENT_LENGTH
        value: "5242880"
    disk:
      name: uploads
      mountPath: /opt/render/project/uploads
      sizeGB: 1

databases:
  - name: campus-issue-db
    plan: free
    databaseName: campus_complaints
    user: campus_admin
